name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check erpnext_pax8/
      - name: Format check
        run: ruff format --check erpnext_pax8/

  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Check imports
        run: python -c "import erpnext_pax8"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check for tests
        id: check
        run: |
          if [ -d "tests" ]; then echo "exists=true" >> $GITHUB_OUTPUT
          else echo "exists=false" >> $GITHUB_OUTPUT; fi
      - name: Install pytest
        if: steps.check.outputs.exists == 'true'
        run: pip install pytest requests
      - name: Run tests
        if: steps.check.outputs.exists == 'true'
        run: pytest tests/ -v

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, import-check]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract changelog section
        id: cl
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          NOTES=$(awk "/^## v${VERSION}/,/^## v[0-9]/" CHANGELOG.md | head -n -1 | tail -n +2)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.cl.outputs.notes }}
